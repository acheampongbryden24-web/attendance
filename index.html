<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack | Cloud Attendance & Absentees</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        /* THEME VARIABLES */
        :root {
            --bg: #0f172a;
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
            --header-bg: #2563eb;
            --table-row: rgba(128, 128, 128, 0.1);
        }

        .light-theme {
            --bg: #f1f5f9;
            --text: #1e293b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --header-bg: #1e3a8a;
            --table-row: #cbd5e1;
        }

        body { 
            margin:0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            transition: 0.3s; 
            overflow-x: hidden; 
            background: var(--bg); 
            color: var(--text); 
        }
        
        /* LOGIN UI */
        .login-container {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1e3a8a,#2563eb,#0f172a);
            background-size:300% 300%;
            animation:bgMove 8s infinite alternate;
        }

        @keyframes bgMove { 
            0%{background-position:left;} 
            100%{background-position:right;} 
        }

        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding:40px;
            border-radius:20px;
            width:320px;
            text-align:center;
            color:white;
            box-shadow:0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .input-group input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            box-sizing: border-box;
            outline: none;
        }

        .login-btn {
            width:100%;
            padding:12px;
            background:#22c55e;
            border:none;
            border-radius:10px;
            color:white;
            cursor:pointer;
            font-weight: bold;
            transition:0.3s;
            margin-top: 10px;
        }

        /* DASHBOARD UI */
        header { 
            padding:20px; 
            text-align:center; 
            background: var(--header-bg); 
            color:white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        .container { 
            padding:30px; 
            max-width: 1200px; 
            margin: auto; 
            min-height: 80vh; 
        }
        
        .controls { 
            margin-bottom: 25px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: center; 
        }
        
        button { 
            padding:12px 20px; 
            border:none; 
            border-radius:8px; 
            cursor:pointer; 
            font-weight: 600; 
            transition: 0.2s; 
        }

        .btn-green { background:#22c55e; color:white; }
        .btn-blue { background:#3b82f6; color:white; }
        .btn-red { background:#ef4444; color:white; }
        .btn-amber { background:#f59e0b; color:white; }
        .btn-theme { background: #64748b; color: white; }
        .btn-outline { background: transparent; border: 1px solid #64748b; color: var(--text); }

        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            margin-bottom: 30px; 
        }

        .card { 
            padding:25px; 
            background: var(--card-bg); 
            border-radius:15px; 
            border: 1px solid var(--card-border); 
        }

        .stats-val { 
            font-size: 2.2em; 
            font-weight: bold; 
            display: block; 
            margin-top: 5px; 
        }

        .table-container { 
            overflow-x: auto; 
            background: var(--card-bg); 
            border-radius: 15px; 
            border: 1px solid var(--card-border); 
        }

        table { 
            width:100%; 
            border-collapse:collapse; 
        }

        th, td { 
            padding:18px; 
            text-align: left; 
            border-bottom:1px solid var(--table-row); 
        }
        
        .status-dot { 
            height: 12px; 
            width: 12px; 
            background-color: #ef4444; 
            border-radius: 50%; 
            display: inline-block; 
        }

        .status-dot.online { 
            background-color: #22c55e; 
            box-shadow: 0 0 10px #22c55e; 
        }
        
        #absentList { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin-top: 15px; 
        }

        .absent-tag { 
            background: rgba(245, 158, 11, 0.15); 
            border: 1px solid rgba(245, 158, 11, 0.5); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 0.9em; 
            color: #f59e0b;
        }

        .main-footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 50px;
            border-top: 1px solid var(--card-border);
            color: #94a3b8;
            font-size: 14px;
        }

        /* MOBILE RESPONSIVE FIXES */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .controls { gap: 10px; }
            button { flex: 1 1 40%; font-size: 13px; padding: 10px; }
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
            .stats-grid .card:first-child { grid-column: span 1 !important; }
            header h2 { font-size: 1.2em; }
        }
    </style>
</head>

<body>

<div id="loginPage" class="login-container">
    <div class="login-card">
        <h1>EduTrack</h1>
        <p style="opacity:0.8;">Smart Attendance System</p>
        
        <div id="loginFields">
            <div class="input-group">
                <input id="username" type="text" placeholder="Username" autocomplete="off">
                <input id="password" type="password" placeholder="Password">
            </div>
            <button class="login-btn" onclick="login()">Login</button>
            <p onclick="toggleChangePass()" style="font-size: 0.8em; cursor: pointer; margin-top: 15px; text-decoration: underline; opacity: 0.7;">Change Password?</p>
        </div>

        <div id="changePassFields" style="display:none;">
            <div class="input-group">
                <input id="oldPass" type="password" placeholder="Current Password">
                <input id="newPass" type="password" placeholder="New Password">
            </div>
            <button class="login-btn" style="background: #3b82f6;" onclick="saveNewPassword()">Update Password</button>
            <p onclick="toggleChangePass()" style="font-size: 0.8em; cursor: pointer; margin-top: 15px;">Back to Login</p>
        </div>
        
        <p id="error" style="color:#f87171; margin-top:10px;"></p>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <header><h2>📘 EduTrack Smart Attendance System</h2></header>
    
    <div class="container">
        <div class="controls">
            <button class="btn-green" onclick="connectSerial()">🔌 Connect Arduino</button>
            <button class="btn-amber" onclick="toggleAbsentees()">🔍 View Absentees</button>
            <button class="btn-theme" onclick="toggleTheme()">🌓 Theme</button>
            <button class="btn-outline" onclick="newDay()" style="border-color:#22c55e; color:#22c55e;">🆕 New Day</button>
            <button class="btn-red" onclick="closeDay()">🔒 Close Day</button>
            <button class="btn-blue" onclick="exportCSV()">📥 Export Report</button>
            <button class="btn-outline" onclick="logout()">Logout</button>
            
            <div style="margin-left:auto;">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText"> OFFLINE</span>
            </div>
        </div>

        <div id="absenteeSection" class="card" style="display:none; margin-bottom: 25px; border-color: #f59e0b;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:#f59e0b; margin:0;">Absent Today (Not Scanned)</h3>
                <button class="btn-outline" onclick="toggleAbsentees()" style="padding:5px 10px; font-size:0.8em;">Close</button>
            </div>
            <div id="absentList"></div>
        </div>

        <div class="stats-grid">
            <div class="card" style="grid-column: span 2; text-align: center; border-color: #3b82f6;">
                <span style="color:#3b82f6; font-weight: bold; letter-spacing: 1px;">TODAY'S DATE</span>
                <span id="displayDate" class="stats-val" style="font-size: 1.8em;">---</span>
            </div>

            <div class="card">
                <span style="color:#22c55e;">Total Present Today</span>
                <span id="present" class="stats-val">0</span>
            </div>
            <div class="card">
                <span style="color:#ef4444;">Invalid Entries</span>
                <span id="invalid" class="stats-val">0</span>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; 2026 BRYDEN TECH SOLUTION. All Rights Reserved.</p>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBgM4SKAC2INlrYPBKdd8lxk6asH_12Yos",
        authDomain: "edutrack-d06cb.firebaseapp.com",
        projectId: "edutrack-d06cb",
        storageBucket: "edutrack-d06cb.firebasestorage.app",
        messagingSenderId: "579911170530",
        appId: "1:579911170530:web:bd3d25e2f0f79a5f65e1bb",
        measurementId: "G-3Q1JSWPT47",
        databaseURL: "https://edutrack-d06cb-default-rtdb.europe-west1.firebasedatabase.app/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const students = {
        "1001": "Bryden", "1002": "Janet", "1003": "Kekeli", "1004": "Naomi",
        "1005": "Justice", "1006": "Lydia", "1007": "Franklin", "1008": "Lord",
        "1009": "Ashley", "1010": "Braelyn"
    };

    let records = [];
    let port, reader;
    let showingAbsentees = false;
    const decoder = new TextDecoder();

    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    if (!localStorage.getItem("adminPassword")) {
        localStorage.setItem("adminPassword", "1234");
    }

    function login() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const savedPass = localStorage.getItem("adminPassword");
        
        if (u === "edutrack" && p === savedPass) {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            
            listenToFirebase(); 
            monitorFirebaseConnection(); 
        } else {
            document.getElementById("error").innerText = "❌ Invalid Credentials";
        }
    }

    function monitorFirebaseConnection() {
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");

            if (snap.val() === true) {
                statusDot.classList.add("online");
                statusText.innerText = " ONLINE";
            } else {
                statusDot.classList.remove("online");
                statusText.innerText = " OFFLINE";
            }
        });
    }

    function toggleChangePass() {
        const loginFields = document.getElementById("loginFields");
        const changeFields = document.getElementById("changePassFields");
        
        loginFields.style.display = loginFields.style.display === "none" ? "block" : "none";
        changeFields.style.display = changeFields.style.display === "none" ? "block" : "none";
    }

    function saveNewPassword() {
        const oldP = document.getElementById("oldPass").value;
        const newP = document.getElementById("newPass").value;
        
        if (oldP === localStorage.getItem("adminPassword")) {
            if (newP.length < 4) { 
                alert("Too short!"); 
                return; 
            }
            localStorage.setItem("adminPassword", newP);
            alert("✅ Password updated successfully!");
            toggleChangePass(); 
        } else { 
            alert("Current password incorrect!"); 
        }
    }

    async function connectSerial() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            reader = port.readable.getReader();
            readLoop();
        } catch (e) { 
            alert("Failed to connect to Serial Port."); 
        }
    }

    async function readLoop() {
        let buffer = "";
        while (true) {
            try {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value);
                
                if (buffer.includes("\n")) {
                    let lines = buffer.split("\n");
                    buffer = lines.pop();
                    lines.forEach(line => { 
                        if(line.trim()) saveToFirebase(line.trim()); 
                    });
                }
            } catch (err) { break; }
        }
    }

    async function saveToFirebase(id) {
        // NUCLEAR CLEAN: Remove everything except numbers (strips invisible characters)
        id = id.replace(/[^0-9]/g, '');
        
        console.log("Processing ID: '" + id + "'"); // Debug log

        const today = new Date().toISOString().split('T')[0];
        
        if (!students[id]) {
            db.ref('invalid_scans/' + today).push({
                id: id,
                time: new Date().toLocaleTimeString(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            return;
        }

        db.ref('attendance/' + today + '/' + id).set({
            name: students[id],
            id: id,
            status: "PRESENT",
            time: new Date().toLocaleTimeString(),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        console.log("Success: " + students[id] + " recorded.");
    }

    function listenToFirebase() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("displayDate").innerText = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        
        db.ref('attendance/' + today).on('value', (snapshot) => {
            records = [];
            let pCount = 0, iCount = 0;
            
            snapshot.forEach(child => {
                const data = child.val();
                records.unshift(data); 
                pCount++; 
            });
            
            db.ref('invalid_scans/' + today).once('value', (s) => {
                iCount = s.numChildren();
                document.getElementById("present").innerText = pCount;
                document.getElementById("invalid").innerText = iCount;
                updateUI();
            });
        });
    }

    function updateUI() {
        document.getElementById("table").innerHTML = records.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.id}</td>
                <td style="font-weight:bold; color:#22c55e">PRESENT</td>
                <td>${r.time}</td>
            </tr>
        `).join('');
    }

    function toggleAbsentees() {
        showingAbsentees = !showingAbsentees;
        document.getElementById("absenteeSection").style.display = showingAbsentees ? "block" : "none";
        
        if(showingAbsentees) renderAbsentList();
    }

    function renderAbsentList() {
        const presentIds = records.map(r => r.id);
        const abs = Object.keys(students).filter(id => !presentIds.includes(id));
        
        document.getElementById("absentList").innerHTML = abs.length === 0 ? 
            "✅ All students are present!" : 
            abs.map(id => `<div class="absent-tag"><strong>${students[id]}</strong> (${id})</div>`).join('');
    }

    function newDay() { 
        if(confirm("Ready for a New Day?")) location.reload(); 
    }

    async function closeDay() {
        if(confirm("Finalize today's session?")) {
            const today = new Date().toISOString().split('T')[0];
            const presentIds = records.map(r => r.id);
            const abs = Object.keys(students).filter(id => !presentIds.includes(id));
            
            const promises = abs.map(id => db.ref('absentees/' + today).push({ 
                name: students[id], 
                id: id, 
                status: "ABSENT", 
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            }));
            
            await Promise.all(promises);
            exportCSV();
            logout();
        }
    }

    function exportCSV() {
        let csv = "Name,ID,Status,Time\n";
        records.forEach(r => { 
            csv += `"${r.name}","${r.id}","PRESENT","${r.time}"\n`; 
        });
        
        const b = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `Full_Report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function logout() { 
        location.reload(); 
    }
</script>
</body>
</html>
